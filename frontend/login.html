<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <section class="login-page">

        <div class="login-box">

            <h2>Welcome Back</h2>

            <p class="login-text">
                Login to access your diagnostic dashboard
            </p>

            <form id="loginForm">

                <input type="email"
                    id="loginEmail"
                    placeholder="Email Address"
                    required>

                <input type="password"
                    id="loginPassword"
                    placeholder="Password"
                    required>

                <button type="submit">
                    Login
                </button>

            </form>

            <p class="register-link">
                Don't have an account?
                <a href="register.html">
                    Register
                </a>
            </p>

        </div>

    </section>
<script src="script.js"></script>
</body>

</html>
