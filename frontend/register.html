<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <section class="login-page">

        <div class="login-box">

            <h2>Create Account</h2>

            <p class="login-text">
                Register to access diagnostic services
            </p>

            <form id="registerForm">

                <input type="text"
       id="name"
       placeholder="Full Name"
       required>

<input type="email"
       id="email"
       placeholder="Email Address"
       required>

<input type="password"
       id="password"
       placeholder="Password"
       required>

<input type="password"
       id="confirmPassword"
       placeholder="Confirm Password"
       required>

                <button type="submit">
                    Register
                </button>

            </form>

            <p class="register-link">
                Already have an account?
                <a href="login.html">
                    Login
                </a>
            </p>

        </div>

    </section>
<script src="script.js"></script>
</body>

</html>
